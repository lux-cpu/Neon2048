<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>2048</title>
<style>
:root{
  --bg:#faf8ef; --board-bg:#bbada0; --cell-empty:#cdc1b4;
  --text-dark:#776e65; --text-light:#f9f6f2; --accent:#8f7a66; --accent-hover:#9f8b77;
  --tile-2:#eee4da; --tile-4:#ede0c8; --tile-8:#f2b179; --tile-16:#f59563;
  --tile-32:#f67c5f; --tile-64:#f65e3b; --tile-128:#edcf72; --tile-256:#edcc61;
  --tile-512:#edc850; --tile-1024:#edc53f; --tile-2048:#edc22e; --tile-super:#3c3a32;
  --tile-2-c:var(--text-dark); --tile-4-c:var(--text-dark);
}

[data-theme="dark"]{
  --bg:#1a1a2e; --board-bg:#0f3460; --cell-empty:#16213e;
  --text-dark:#e8e8e8; --text-light:#ffffff; --accent:#e94560; --accent-hover:#ff5c76;
  --tile-2:#233554; --tile-4:#2b4570; --tile-8:#3a5f9e; --tile-16:#4d7bc7;
  --tile-32:#5e94e0; --tile-64:#e94560; --tile-128:#ff6b6b; --tile-256:#ffa62b;
  --tile-512:#ffd23f; --tile-1024:#c9f2c7; --tile-2048:#7cffcb; --tile-super:#00fff5;
  --tile-2-c:var(--text-light); --tile-4-c:var(--text-light);
}

[data-theme="ocean"]{
  --bg:#e0f7fa; --board-bg:#00838f; --cell-empty:#4fb3bf;
  --text-dark:#004d5c; --text-light:#ffffff; --accent:#006064; --accent-hover:#00838f;
  --tile-2:#b2ebf2; --tile-4:#80deea; --tile-8:#4dd0e1; --tile-16:#26c6da;
  --tile-32:#00bcd4; --tile-64:#00acc1; --tile-128:#0097a7; --tile-256:#00838f;
  --tile-512:#006064; --tile-1024:#ffca28; --tile-2048:#ffa000; --tile-super:#004d40;
  --tile-2-c:var(--text-dark); --tile-4-c:var(--text-dark);
}

[data-theme="forest"]{
  --bg:#eef2e6; --board-bg:#5c7a4f; --cell-empty:#c3d1b5;
  --text-dark:#3d4a35; --text-light:#f7faf3; --accent:#718866; --accent-hover:#7d9370;
  --tile-2:#e3e9d9; --tile-4:#d5dfc4; --tile-8:#c3d1ab; --tile-16:#adc190;
  --tile-32:#96ab79; --tile-64:#7f9566; --tile-128:#708a5a; --tile-256:#63794f;
  --tile-512:#556844; --tile-1024:#c9ad6e; --tile-2048:#d1a94a; --tile-super:#2f3b28;
  --tile-2-c:var(--text-dark); --tile-4-c:var(--text-dark);
}

[data-theme="candy"]{
  --bg:#fff0f6; --board-bg:#d6336c; --cell-empty:#f3a6c5;
  --text-dark:#7a1f4d; --text-light:#ffffff; --accent:#e64980; --accent-hover:#f06595;
  --tile-2:#ffdeeb; --tile-4:#fcc2d7; --tile-8:#faa2c1; --tile-16:#f783ac;
  --tile-32:#f06595; --tile-64:#e64980; --tile-128:#d6336c; --tile-256:#c2255c;
  --tile-512:#a61e4d; --tile-1024:#ae3ec9; --tile-2048:#9c36b5; --tile-super:#5f0f40;
  --tile-2-c:var(--text-dark); --tile-4-c:var(--text-dark);
}

[data-theme="neon"]{
  --bg:#0a0014; --board-bg:#1a0533; --cell-empty:#2d0a4e;
  --text-dark:#f0f0f0; --text-light:#ffffff; --accent:#ff2079; --accent-hover:#ff4d94;
  --tile-2:#3d1266; --tile-4:#5a1a8f; --tile-8:#7b2ff7; --tile-16:#9d4edd;
  --tile-32:#c77dff; --tile-64:#ff2079; --tile-128:#ff5cab; --tile-256:#00f5d4;
  --tile-512:#00bbf9; --tile-1024:#fee440; --tile-2048:#f15bb5; --tile-super:#000000;
  --tile-2-c:var(--text-light); --tile-4-c:var(--text-light);
}

[data-theme="comfort"]{
  --bg:#f5ecdc; --board-bg:#a68a64; --cell-empty:#d9c4a3;
  --text-dark:#4a3c2e; --text-light:#fdf6ec; --accent:#8c6d46; --accent-hover:#9c7d56;
  --tile-2:#ede0cb; --tile-4:#e6d3b3; --tile-8:#dcc191; --tile-16:#d1ae76;
  --tile-32:#c49b5f; --tile-64:#b2854f; --tile-128:#a17347; --tile-256:#8f6440;
  --tile-512:#7d5638; --tile-1024:#c9a86a; --tile-2048:#e0b84f; --tile-super:#3d2f22;
  --tile-2-c:var(--text-dark); --tile-4-c:var(--text-dark);
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--bg);font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;
  display:flex;justify-content:center;align-items:center;min-height:100dvh;
  -webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;
  -webkit-touch-callout:none;touch-action:manipulation;overflow:hidden;
  transition:background .3s ease;
}
body.shake{animation:screenShake .4s ease}
@keyframes screenShake{0%,100%{transform:translateX(0)}10%{transform:translateX(-8px)}20%{transform:translateX(8px)}30%{transform:translateX(-6px)}40%{transform:translateX(6px)}50%{transform:translateX(-4px)}60%{transform:translateX(4px)}70%{transform:translateX(-2px)}80%{transform:translateX(2px)}}

.container{
  width:100%;max-width:min(480px,94vw);
  max-height:100dvh;
  padding:clamp(8px,2vw,20px);
  display:flex;flex-direction:column;gap:clamp(8px,1.6vh,16px);
}
.header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px}
.title-section h1{
  font-size:clamp(2rem,8vw,3rem);font-weight:800;color:var(--text-dark);letter-spacing:-2px;
  background:linear-gradient(90deg,var(--text-dark),var(--accent),var(--text-dark));
  background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:titleShine 4s linear infinite, titlePop .6s ease;
  display:inline-block;
}
@keyframes titleShine{0%{background-position:0% center}100%{background-position:200% center}}
@keyframes titlePop{0%{transform:scale(0.6) rotate(-8deg);opacity:0}60%{transform:scale(1.1) rotate(3deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.title-section p{color:#9d8e83;font-size:0.8rem;margin-top:2px}
.top-controls{display:flex;gap:6px;align-items:flex-start}
.icon-btn{
  background:var(--accent);color:#fff;border:none;border-radius:8px;width:40px;height:40px;
  font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s ease;position:relative;flex-shrink:0;
}
.icon-btn:hover{background:var(--accent-hover)}
.icon-btn:active{transform:scale(0.92)}
.theme-popover{
  position:absolute;top:48px;right:0;background:var(--board-bg);border-radius:10px;padding:10px;
  display:none;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:20;
}
.theme-popover.open{display:grid;grid-template-columns:repeat(3,1fr)}
.theme-swatch{
  width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;
  transition:transform .12s ease;
}
.theme-swatch:hover{transform:scale(1.1)}
.theme-swatch.active{border-color:#fff}
.row{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.scores{display:flex;gap:8px}
.score-box{background:var(--board-bg);color:#fff;border-radius:8px;padding:8px 16px;text-align:center;min-width:64px}
.score-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:1px;opacity:0.8;font-weight:600}
.score-value{font-size:1.25rem;font-weight:700;line-height:1.2}
.btn{
  background:var(--accent);color:#fff;border:none;border-radius:8px;padding:11px 20px;font-size:0.8rem;
  font-weight:700;cursor:pointer;letter-spacing:0.5px;transition:all .15s ease;text-transform:uppercase;
}
.btn:hover{background:var(--accent-hover)}
.btn:active{transform:scale(0.96)}
.board-wrapper{
  position:relative;background:var(--board-bg);border-radius:12px;padding:clamp(6px,1.8vw,12px);
  box-shadow:0 8px 30px rgba(0,0,0,.18);width:100%;transition:background .3s ease;
}
.board{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:clamp(6px,1.8vw,10px);aspect-ratio:1;position:relative}
.cell{background:var(--cell-empty);border-radius:8px;aspect-ratio:1;transition:background .3s ease}
.tiles-layer{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
.tile{
  position:absolute;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-weight:700;line-height:1;transition:left .1s ease,top .1s ease;will-change:left,top;
}
.tile.pop{animation:pop .15s ease .1s both}
.tile.spawn{animation:spawnAnim .15s ease both}
.tile.celebrate{animation:celebrate .6s ease both}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
@keyframes spawnAnim{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes celebrate{
  0%{transform:scale(1) rotateZ(0);filter:drop-shadow(0 0 0 rgba(255,255,200,1))}
  50%{transform:scale(1.15) rotateZ(5deg);filter:drop-shadow(0 0 20px rgba(255,255,100,0.8))}
  100%{transform:scale(1) rotateZ(0);filter:drop-shadow(0 0 0 rgba(255,255,200,0))}
}
.tile[data-value="2"]{background:var(--tile-2);color:var(--tile-2-c);font-size:clamp(1.3rem,6vw,2rem)}
.tile[data-value="4"]{background:var(--tile-4);color:var(--tile-4-c);font-size:clamp(1.3rem,6vw,2rem)}
.tile[data-value="8"]{background:var(--tile-8);color:var(--text-light);font-size:clamp(1.3rem,6vw,2rem)}
.tile[data-value="16"]{background:var(--tile-16);color:var(--text-light);font-size:clamp(1.15rem,5.4vw,1.8rem)}
.tile[data-value="32"]{background:var(--tile-32);color:var(--text-light);font-size:clamp(1.15rem,5.4vw,1.8rem)}
.tile[data-value="64"]{background:var(--tile-64);color:var(--text-light);font-size:clamp(1.15rem,5.4vw,1.8rem)}
.tile[data-value="128"]{background:var(--tile-128);color:var(--text-light);font-size:clamp(0.95rem,4.6vw,1.5rem)}
.tile[data-value="256"]{background:var(--tile-256);color:var(--text-light);font-size:clamp(0.95rem,4.6vw,1.5rem)}
.tile[data-value="512"]{background:var(--tile-512);color:var(--text-light);font-size:clamp(0.95rem,4.6vw,1.5rem)}
.tile[data-value="1024"]{background:var(--tile-1024);color:var(--text-light);font-size:clamp(0.75rem,3.8vw,1.2rem)}
.tile[data-value="2048"]{background:var(--tile-2048);color:var(--text-light);font-size:clamp(0.75rem,3.8vw,1.2rem);
  box-shadow:0 0 20px 6px rgba(237,194,46,.5)}
.tile[data-value="4096"],.tile[data-value="8192"]{background:var(--tile-super);color:var(--text-light);font-size:clamp(0.65rem,3vw,1rem)}
.overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.45);border-radius:12px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;
  pointer-events:none;opacity:0;transition:opacity .3s ease;backdrop-filter:blur(2px);
}
.overlay.active{opacity:1;pointer-events:all}
.overlay-text{font-size:clamp(1.6rem,7vw,2.5rem);font-weight:800;color:#fff;text-align:center}
.overlay .btn{margin-top:16px;font-size:1rem;padding:14px 28px}

/* Confetti Canvas */
#confettiCanvas{
  position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;
}

/* Particles */
.particle{
  position:fixed;pointer-events:none;z-index:6;font-size:1.5rem;
  will-change:transform,opacity;
}
.particle-star{animation:particleFly 1.2s ease-out forwards}
.particle-spark{animation:sparkFly 0.8s ease-out forwards}
@keyframes particleFly{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}
}
@keyframes sparkFly{
  0%{transform:translate(0,0) scale(1);opacity:1;filter:brightness(2)}
  100%{transform:translate(var(--tx),var(--ty)) scale(0.2);opacity:0}
}

.instruction{text-align:center;color:#aaa;font-size:.75rem}
</style>
</head>
<body data-theme="comfort">
<canvas id="confettiCanvas"></canvas>

<div class="container">
  <div class="header">
    <div class="title-section">
      <h1 id="titleEl">2048</h1>
      <p>Merge tiles to reach 2048!</p>
    </div>
    <div class="top-controls" style="position:relative">
      <button class="icon-btn" id="soundBtn" title="Toggle sound">🔊</button>
      <div style="position:relative">
        <button class="icon-btn" id="themeBtn" title="Change theme">🎨</button>
        <div class="theme-popover" id="themePopover">
          <div class="theme-swatch" data-theme="classic" style="background:#eee4da" title="Classic"></div>
          <div class="theme-swatch" data-theme="dark" style="background:#0f3460" title="Dark"></div>
          <div class="theme-swatch" data-theme="ocean" style="background:#00838f" title="Ocean"></div>
          <div class="theme-swatch" data-theme="forest" style="background:#33691e" title="Forest"></div>
          <div class="theme-swatch" data-theme="candy" style="background:#d6336c" title="Candy"></div>
          <div class="theme-swatch" data-theme="neon" style="background:#7b2ff7" title="Neon"></div>
          <div class="theme-swatch" data-theme="comfort" style="background:#a68a64" title="Comfort (Eye-friendly)"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="scores">
      <div class="score-box"><div class="score-label">Score</div><div class="score-value" id="score">0</div></div>
      <div class="score-box"><div class="score-label">Best</div><div class="score-value" id="best">0</div></div>
    </div>
    <button class="btn" id="restartBtn">New Game</button>
  </div>

  <div class="board-wrapper" id="boardWrapper">
    <div class="board" id="boardGrid"></div>
    <div class="tiles-layer" id="tilesLayer"></div>
    <div class="overlay" id="overlay">
      <div class="overlay-text" id="overlayText">Game Over!</div>
      <button class="btn" id="overlayBtn">Try Again</button>
    </div>
  </div>

  <p class="instruction">Arrow keys or swipe to move</p>
</div>


<script>
(function(){
  const boardGrid = document.getElementById('boardGrid');
  const tilesLayer = document.getElementById('tilesLayer');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const overlayText = document.getElementById('overlayText');
  const overlayBtn = document.getElementById('overlayBtn');
  const restartBtn = document.getElementById('restartBtn');
  const boardWrapper = document.getElementById('boardWrapper');
  const themeBtn = document.getElementById('themeBtn');
  const themePopover = document.getElementById('themePopover');
  const soundBtn = document.getElementById('soundBtn');
  const confettiCanvas = document.getElementById('confettiCanvas');
  const ctx = confettiCanvas.getContext('2d');

  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
  window.addEventListener('resize', ()=>{
    confettiCanvas.width = window.innerWidth;
    confettiCanvas.height = window.innerHeight;
  });

  const SIZE = 4;
  let tiles = [];
  let score = 0, bestScore = 0;
  let gameOverFlag = false, wonFlag = false, keepPlaying = false;
  let idCounter = 0;
  let busy = false;
  let soundOn = true;
  let cellEls = [];
  let confetti = [];

  // ───────── Confetti ─────────
  class Confetto {
    constructor(){
      this.x = Math.random()*confettiCanvas.width;
      this.y = Math.random()*confettiCanvas.height - confettiCanvas.height;
      this.vx = (Math.random()-0.5)*8;
      this.vy = Math.random()*4 + 4;
      this.rotation = Math.random()*Math.PI*2;
      this.spin = (Math.random()-0.5)*0.15;
      this.color = ['#f59563','#edc22e','#f2b179','#edcc61','#f67c5f'][Math.floor(Math.random()*5)];
      this.life = 1;
    }
    update(){
      this.x += this.vx;
      this.y += this.vy;
      this.vy += 0.15;
      this.rotation += this.spin;
      this.life -= 0.008;
    }
    draw(){
      ctx.save();
      ctx.globalAlpha = this.life;
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      ctx.fillStyle = this.color;
      ctx.fillRect(-4, -2, 8, 4);
      ctx.restore();
    }
  }

  function startConfetti(){
    for(let i=0;i<50;i++){
      confetti.push(new Confetto());
    }
    animateConfetti();
  }

  function animateConfetti(){
    ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    confetti = confetti.filter(c => c.life > 0);
    confetti.forEach(c => { c.update(); c.draw(); });
    if(confetti.length > 0) requestAnimationFrame(animateConfetti);
  }

  // ───────── Particles ─────────
  function createParticles(x, y, count, emoji){
    for(let i=0;i<count;i++){
      const angle = (Math.PI*2*i)/count;
      const speed = 4 + Math.random()*3;
      const tx = Math.cos(angle)*speed*30;
      const ty = Math.sin(angle)*speed*30 - 40;
      
      const p = document.createElement('div');
      p.className = 'particle particle-star';
      p.textContent = emoji || '✨';
      p.style.left = x+'px';
      p.style.top = y+'px';
      p.style.setProperty('--tx', tx+'px');
      p.style.setProperty('--ty', ty+'px');
      document.body.appendChild(p);
      
      setTimeout(()=>p.remove(), 1200);
    }
  }

  // ───────── Sound (theme-aware profiles) ─────────
  let actx = null;
  function ensureAudio(){ if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } }

  // Each theme has its own waveform character + pitch multiplier for a distinct feel
  const soundProfiles = {
    classic: { wave:'sine',     pitch:1.0  }, // warm, clean, familiar
    dark:    { wave:'square',   pitch:0.85 }, // deeper, edgy, retro-electronic
    ocean:   { wave:'sine',     pitch:1.15 }, // airy, higher, watery/bell-like
    forest:  { wave:'triangle', pitch:0.9  }, // soft, woody, mellow
    candy:   { wave:'triangle', pitch:1.35 }, // bright, playful, higher pitched
    neon:    { wave:'sawtooth', pitch:1.2  }, // sharp, synth, cyberpunk buzz
    comfort: { wave:'sine',     pitch:0.75 }  // low, gentle, soothing for eye/ear comfort
  };
  function currentProfile(){
    const theme = document.body.getAttribute('data-theme') || 'classic';
    return soundProfiles[theme] || soundProfiles.classic;
  }

  function tone(freq, dur, type, gainVal, delay){
    if(!soundOn || !actx) return;
    const t0 = actx.currentTime + (delay||0);
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(gainVal||0.15, t0+0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    osc.connect(gain); gain.connect(actx.destination);
    osc.start(t0); osc.stop(t0+dur+0.02);
  }
  function sfxMove(){
    const p = currentProfile();
    tone(220*p.pitch, 0.08, p.wave, 0.06);
  }
  function sfxMerge(value){
    const p = currentProfile();
    const pitch = (300 + Math.log2(value)*40) * p.pitch;
    tone(pitch, 0.14, p.wave, 0.14);
  }
  function sfxSpawn(){
    const p = currentProfile();
    tone(500*p.pitch, 0.05, p.wave, 0.04);
  }
  function sfxWin(){
    const p = currentProfile();
    [523,659,784,1047].forEach((f,i)=>tone(f*p.pitch,0.25,p.wave,0.15,i*0.12));
  }
  function sfxGameOver(){
    const p = currentProfile();
    [400,300,200].forEach((f,i)=>tone(f*p.pitch,0.3,p.wave==='sine'?'sawtooth':p.wave,0.1,i*0.15));
  }

  function loadSoundPref(){
    const s = localStorage.getItem('2048_sound');
    soundOn = s === null ? true : s === '1';
    soundBtn.textContent = soundOn ? '🔊' : '🔇';
  }
  soundBtn.addEventListener('click', ()=>{
    ensureAudio();
    soundOn = !soundOn;
    localStorage.setItem('2048_sound', soundOn ? '1':'0');
    soundBtn.textContent = soundOn ? '🔊' : '🔇';
    if(soundOn) tone(440,0.08,'sine',0.08);
  });

  // ───────── Theme ─────────
  function applyTheme(name){
    document.body.setAttribute('data-theme', name);
    localStorage.setItem('2048_theme', name);
    document.querySelectorAll('.theme-swatch').forEach(s=>{
      s.classList.toggle('active', s.dataset.theme === name);
    });
  }
  function loadTheme(){
    const t = localStorage.getItem('2048_theme') || 'comfort';
    applyTheme(t);
  }
  themeBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    themePopover.classList.toggle('open');
  });
  document.querySelectorAll('.theme-swatch').forEach(s=>{
    s.addEventListener('click', ()=>{
      applyTheme(s.dataset.theme);
      themePopover.classList.remove('open');
      requestAnimationFrame(()=>render(true));
    });
  });
  document.addEventListener('click', (e)=>{
    if(!themePopover.contains(e.target) && e.target!==themeBtn) themePopover.classList.remove('open');
  });

  // ───────── Best score ─────────
  function loadBest(){
    const s = localStorage.getItem('2048_best');
    bestScore = s ? parseInt(s,10) : 0;
    bestEl.textContent = bestScore;
  }
  function saveBest(){
    if(score > bestScore){ bestScore = score; localStorage.setItem('2048_best', bestScore); bestEl.textContent = bestScore; }
  }

  // ───────── Board logic ─────────
  function cellAt(r,c){ return tiles.find(t => t.r===r && t.c===c); }
  function emptyCells(){
    const list=[];
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(!cellAt(r,c)) list.push({r,c});
    return list;
  }
  function spawnTile(){
    const empty = emptyCells();
    if(empty.length===0) return;
    const {r,c} = empty[Math.floor(Math.random()*empty.length)];
    const value = Math.random() < 0.9 ? 2 : 4;
    tiles.push({id:++idCounter, value, r, c, merged:false, isNew:true});
    sfxSpawn();
  }

  function initGame(){
    tiles = []; score = 0; gameOverFlag = false; wonFlag = false; keepPlaying = false;
    idCounter = 0; scoreEl.textContent = '0';
    overlay.classList.remove('active','win');
    buildGrid();
    spawnTile(); spawnTile();
    render(true);
  }

  function buildGrid(){
    boardGrid.innerHTML = '';
    cellEls = [];
    for(let i=0;i<SIZE*SIZE;i++){
      const cell = document.createElement('div');
      cell.className='cell';
      boardGrid.appendChild(cell);
      cellEls.push(cell);
    }
  }

  function buildLine(i, dir){
    const coords = [];
    for(let k=0;k<SIZE;k++){
      if(dir==='left')  coords.push({r:i, c:k});
      if(dir==='right') coords.push({r:i, c:SIZE-1-k});
      if(dir==='up')    coords.push({r:k, c:i});
      if(dir==='down')  coords.push({r:SIZE-1-k, c:i});
    }
    return coords;
  }

  function move(dir){
    if(busy || gameOverFlag) return;
    ensureAudio();
    tiles.forEach(t => { t.merged=false; t.isNew=false; });
    let moved = false, gained = 0, mergedAny = false;

    for(let i=0;i<SIZE;i++){
      const coords = buildLine(i, dir);
      const lineTiles = coords.map(({r,c}) => cellAt(r,c)).filter(Boolean);
      const result = [];
      let skip = false;
      for(let k=0;k<lineTiles.length;k++){
        if(skip){ skip=false; continue; }
        const cur = lineTiles[k];
        const next = lineTiles[k+1];
        if(next && next.value === cur.value){
          cur.value *= 2; cur.merged = true; gained += cur.value; mergedAny = true;
          tiles = tiles.filter(t => t !== next);
          result.push(cur);
          skip = true;
        } else {
          result.push(cur);
        }
      }
      result.forEach((t, idx) => {
        const pos = coords[idx];
        if(t.r !== pos.r || t.c !== pos.c) moved = true;
        t.r = pos.r; t.c = pos.c;
      });
    }

    if(moved || gained>0){
      score += gained; scoreEl.textContent = score; saveBest();
      busy = true;
      if(mergedAny) tiles.filter(t=>t.merged).forEach(t=>sfxMerge(t.value)); else sfxMove();
      spawnTile();
      render(false);
      setTimeout(() => { busy = false; checkState(); }, 130);
    }
  }

  function has2048(){ return tiles.some(t => t.value >= 2048); }
  function canMove(){
    if(emptyCells().length>0) return true;
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
      const t = cellAt(r,c); if(!t) continue;
      const right = cellAt(r,c+1), down = cellAt(r+1,c);
      if(right && right.value===t.value) return true;
      if(down && down.value===t.value) return true;
    }
    return false;
  }
  function checkState(){
    if(!wonFlag && !keepPlaying && has2048()){
      wonFlag = true;
      overlayText.textContent = '🎉 You Win!';
      overlay.classList.add('active','win');
      sfxWin();
      celebrate2048();
      return;
    }
    if(!canMove()){
      gameOverFlag = true;
      overlayText.textContent = 'Game Over!';
      overlay.classList.remove('win');
      overlay.classList.add('active');
      sfxGameOver();
    }
  }

  function celebrate2048(){
    setTimeout(()=>{
      startConfetti();
      
      const tile2048 = tiles.find(t=>t.value===2048);
      if(tile2048){
        const idx = tile2048.r*SIZE + tile2048.c;
        const cellRect = cellEls[idx].getBoundingClientRect();
        const x = cellRect.left + cellRect.width/2;
        const y = cellRect.top + cellRect.height/2;
        
        createParticles(x, y, 12, '🎉');
        createParticles(x, y, 12, '⭐');
        createParticles(x, y, 12, '✨');
      }
      
      document.body.classList.add('shake');
      setTimeout(()=>document.body.classList.remove('shake'), 400);
    }, 100);
  }

  // ───────── Render ─────────
  function render(instant){
    if(cellEls.length===0) buildGrid();
    const layerRect = tilesLayer.getBoundingClientRect();

    const liveIds = new Set(tiles.map(t=>t.id));
    tilesLayer.querySelectorAll('.tile').forEach(el=>{
      const id = parseInt(el.dataset.id,10);
      if(!liveIds.has(id)) el.remove();
    });

    tiles.forEach(t=>{
      const idx = t.r*SIZE + t.c;
      const cellRect = cellEls[idx].getBoundingClientRect();
      const left = cellRect.left - layerRect.left;
      const top = cellRect.top - layerRect.top;
      const size = cellRect.width;

      let el = tilesLayer.querySelector(`.tile[data-id="${t.id}"]`);
      if(!el){
        el = document.createElement('div');
        el.className = 'tile';
        el.dataset.id = t.id;
        el.style.width = size+'px';
        el.style.height = size+'px';
        el.style.left = left+'px';
        el.style.top = top+'px';
        tilesLayer.appendChild(el);
        if(t.isNew && !instant){
          requestAnimationFrame(()=> el.classList.add('spawn'));
        }
      } else {
        el.style.width = size+'px';
        el.style.height = size+'px';
        el.style.left = left+'px';
        el.style.top = top+'px';
      }
      el.setAttribute('data-value', t.value);
      el.textContent = t.value;
      el.classList.toggle('pop', t.merged);
      
      if(t.value === 2048 && !instant){
        el.classList.add('celebrate');
      }
    });
  }

  // ───────── Input ─────────
  function handleKeyDown(e){
    const map = {ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down'};
    if(map[e.key]){ e.preventDefault(); move(map[e.key]); }
  }

  let touchStartX=0, touchStartY=0, touchStartTime=0;
  function handleTouchStart(e){
    if(gameOverFlag) return;
    const t = e.touches[0];
    touchStartX=t.clientX; touchStartY=t.clientY; touchStartTime=Date.now();
  }
  function handleTouchMove(e){
    if(Math.abs(e.touches[0].clientX-touchStartX)>20 || Math.abs(e.touches[0].clientY-touchStartY)>20) e.preventDefault();
  }
  function handleTouchEnd(e){
    if(gameOverFlag) return;
    const t = e.changedTouches[0];
    const dx = t.clientX-touchStartX, dy = t.clientY-touchStartY, dt = Date.now()-touchStartTime;
    if(dt>800) return;
    const adx=Math.abs(dx), ady=Math.abs(dy);
    if(Math.max(adx,ady) < 30) return;
    e.preventDefault();
    if(adx>ady) move(dx>0?'right':'left'); else move(dy>0?'down':'up');
  }

  function restart(){ initGame(); }

  document.addEventListener('keydown', handleKeyDown);
  boardWrapper.addEventListener('touchstart', handleTouchStart, {passive:false});
  boardWrapper.addEventListener('touchmove', handleTouchMove, {passive:false});
  boardWrapper.addEventListener('touchend', handleTouchEnd, {passive:false});
  restartBtn.addEventListener('click', restart);
  overlayBtn.addEventListener('click', ()=>{
    if(wonFlag && !gameOverFlag){ keepPlaying = true; overlay.classList.remove('active'); }
    else restart();
  });

  let resizeTO;
  window.addEventListener('resize', ()=>{ clearTimeout(resizeTO); resizeTO=setTimeout(()=>render(true),100); });

  loadSoundPref();
  loadTheme();
  loadBest();
  initGame();
})();
</script>
</body>
</html>
